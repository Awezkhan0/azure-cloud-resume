name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name stcloudresume2026 \
            --destination '$web' \
            --source . \
            --pattern "*.html" \
            --overwrite

      - name: Purge CDN cache
        run: |
          az afd endpoint purge \
            --resource-group cloud-resume \
            --profile-name cdn-cloud-resume \
            --endpoint-name awez-cloud-resume \
            --content-paths '/*'
